<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0b0f19;
color:#fff;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:
radial-gradient(circle at top left,#1e3c72 0%,transparent 30%),
radial-gradient(circle at bottom right,#00c6a7 0%,transparent 25%),
linear-gradient(135deg,#060b18,#0b1220,#111827);
z-index:-2;
}

/* GLOW */
.glow{
position:fixed;
width:350px;
height:350px;
background:#00ffd5;
filter:blur(140px);
opacity:0.08;
top:-120px;
right:-120px;
z-index:-1;
}

/* CARD */
.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.08);
border-radius:28px;
padding:30px 22px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.45);
}

/* PROFILE IMAGE */
.profile-wrap{
display:flex;
justify-content:center;
}

.profile{
width:130px;
height:130px;
padding:4px;
border-radius:50%;
background:linear-gradient(135deg,#00ffd5,#00aaff);
box-shadow:0 0 25px rgba(0,255,213,0.35);
}

.profile img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
display:block;
}

/* TITLE */
.title{
font-size:28px;
font-weight:800;
margin-top:18px;
background:linear-gradient(90deg,#00ffd5,#00aaff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SUBTITLE */
.subtitle{
margin-top:10px;
font-size:15px;
line-height:1.6;
color:#d7def7;
}

/* COUNTER */
.counter{
margin-top:15px;
font-size:14px;
font-weight:600;
color:#00ffd5;
}

/* FEATURES */
.features{
margin-top:24px;
display:flex;
flex-direction:column;
gap:14px;
}

.feature{
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:16px;
font-size:14px;
font-weight:500;
border:1px solid rgba(255,255,255,0.06);
transition:0.3s;
}

.feature:hover{
transform:translateY(-2px);
background:rgba(255,255,255,0.08);
}

/* BUTTON */
.join-btn{
display:block;
margin-top:28px;
padding:17px;
border-radius:18px;
text-decoration:none;
font-size:18px;
font-weight:800;
background:linear-gradient(90deg,#00ffd5,#00aaff);
color:#001018;
transition:0.3s;
box-shadow:0 0 25px rgba(0,255,213,0.3);
animation:pulse 2s infinite;
}

.join-btn:hover{
transform:scale(1.03);
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.03);}
100%{transform:scale(1);}
}

/* TRUST TEXT */
.trust{
margin-top:16px;
font-size:13px;
color:#b8c2d9;
}

/* DISCLAIMER */
.disclaimer{
margin-top:22px;
font-size:11px;
line-height:1.7;
color:#97a3c6;
padding-top:18px;
border-top:1px solid rgba(255,255,255,0.08);
}

/* FOOTER */
.footer{
margin-top:18px;
}

.footer a{
font-size:12px;
color:#00ffd5;
text-decoration:none;
}

/* MOBILE */
@media(max-width:480px){

.title{
font-size:24px;
}

.card{
padding:25px 18px;
}

.profile{
width:115px;
height:115px;
}

}

</style>
